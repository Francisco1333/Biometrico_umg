<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Login UMG</title>
<style>
  body { font-family: Arial, sans-serif; background-image: url('https://res.cloudinary.com/dspxagazw/image/upload/v1779946346/guatemala_zimpew.webp'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .panel { background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); border-radius: 12px; padding: 40px; width: 340px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); text-align: center; border: 1px solid rgba(255,255,255,0.25); }
  h1 { color: #fff; text-shadow: 1px 1px 2px black; font-size: 20px; margin-bottom: 24px; }
  input { width: 100%; padding: 12px; margin-bottom: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.15); color: #fff; font-size: 14px; box-sizing: border-box; outline: none; }
  input::placeholder { color: rgba(255,255,255,0.6); }
  button { width: 100%; padding: 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.2); color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.25s; }
  button:hover { background: rgba(255,255,255,0.35); }
  .error { color: #f87171; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="panel">
  <h1>🎓 Sistema Biométrico UMG</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="text" name="username" placeholder="Usuario de sede" required/>
    <input type="password" name="contrasena" placeholder="Contraseña" required/>
    <button type="submit">Ingresar</button>
  </form>
</div>
</body>
</html>
